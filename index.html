        // ==========================================
        // 核心技术：前端强力画布算法 (将图片压榨至100KB左右)
        // ==========================================
        function compressImage(file, maxWidth = 1000, quality = 0.7) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        canvas.toBlob((blob) => {
                            resolve(blob);
                        }, 'image/jpeg', quality);
                    };
                };
            });
        }

        // 统一异步文件上传处理器
        async function uploadCompressedFile(blob, folder = 'covers') {
            const fileName = `${folder}/${Date.now()}_${Math.random().toString(36).substring(2, 7)}.jpg`;

       function getMode(arr) {
    if (!arr || arr.length === 0) return null;
    
    // 1. 统计每个选项出现的次数
    const modeMap = {};
    let maxCount = 0;
    for (let i = 0; i < arr.length; i++) {
        const el = arr[i];
        if (el === undefined || el === null || el === '') continue;
        modeMap[el] = (modeMap[el] || 0) + 1;
        if (modeMap[el] > maxCount) {
            maxCount = modeMap[el];
        }
    }
    
    if (maxCount === 0) return null;
    
    // 2. 找出所有获得最大票数的候选者
    const candidates = Object.keys(modeMap).filter(el => modeMap[el] === maxCount);
    
    // 3. 定义评级权重，用于打平时高评级优先。非S/A/B/C字符权重设为0
    const gradeWeights = { 'S': 4, 'A': 3, 'B': 2, 'C': 1 };
    
    // 4. 排序：权重高的排在最前面
    candidates.sort((a, b) => {
        const weightA = gradeWeights[a] || 0;
        const weightB = gradeWeights[b] || 0;
        return weightB - weightA;
    });
    
    // 返回权重最高的那一个（即高评级优先）
    return candidates[0];
}

        function calculateHotelConsensus(reviews) {
            if (!reviews || reviews.length === 0) return { avgRating: "暂无", reviewCount: 0, wildness: '-', privacy: '-', luxury: '-', bestSeason: '暂无推荐' };
            const ratings = reviews.map(r => r.rating).filter(Boolean);
            return {
                avgRating: ratings.length > 0 ? (ratings.reduce((a, b) => a + b, 0) / ratings.length).toFixed(1) : "5.0",
                reviewCount: reviews.length,
                wildness: getMode(reviews.map(r => r.wildness)) || '-',
                privacy: getMode(reviews.map(r => r.privacy)) || '-',
                luxury: getMode(reviews.map(r => r.luxury)) || '-',
                bestSeason: getMode(reviews.map(r => r.best_season)) || '暂无推荐'
            };
        }

        async function loadSavedMarkers() {
            try {
                const { data } = await supabaseClient.from('hotels').select('*');
                hotels = data || [];
                map.eachLayer((layer) => { if (layer instanceof L.Marker && layer !== activeMarker) map.removeLayer(layer); });
                hotels.forEach(createHotelMarkerOnMap);

        function createHotelMarkerOnMap(hotel) {

        }

                        <div class="index-badge"><span class="title">隐秘</span><span class="score ${consensus.privacy === 'S' ? 's-tier' : ''}">${consensus.privacy}</span></div>
                        <div class="index-badge"><span class="title">奢华</span><span class="score ${consensus.luxury === 'S' ? 's-tier' : ''}">${consensus.luxury}</span></div>

                    </div>

            try {
                if (fileInput.files && fileInput.files.length > 0) {
                    // 强制控制前3张
                    const filesToUpload = Array.from(fileInput.files).slice(0, 3);
                    for (const file of filesToUpload) {
                        const compressedBlob = await compressImage(file, 1000, 0.7);
                        const url = await uploadCompressedFile(compressedBlob, 'reviews');
                        uploadedUrls.push(url);
                    }
                }

                await supabaseClient.from('reviews').insert([{
                    hotel_id: hotelId, rating, comment, wildness, privacy, luxury,
                    best_season: bestSeason, owner_id: MY_FINGERPRINT, photo_urls: uploadedUrls
                }]);

                openHotelPopup(hotelId, activeMarker);
            } catch (err) { alert("云端上传失败: " + err.message); }
        }

        async function deleteMyReview(reviewId, hotelId, forceByAdmin = false) {
            if (confirm(forceByAdmin ? "【总发起人警告】强制抹除此人评测？" : "确定撤销此条专属评测？")) {
                try {
                    let q = supabaseClient.from('reviews').delete().eq('id', reviewId);
                    if (!forceByAdmin) q = q.eq('owner_id', MY_FINGERPRINT);
                    await q; openHotelPopup(hotelId, activeMarker);
                } catch(e) { console.error(e); }
            }
        }

        async function handleHotelUpdate(hotelId) {
            const n = prompt("输入新目的地名:"); if (!n) return;
            let q = supabaseClient.from('hotels').update({ name: n.trim() }).eq('id', hotelId);
            if (!isSuperAdmin()) q = q.eq('owner_id', MY_FINGERPRINT);
            await q; openHotelPopup(hotelId, activeMarker);
        }

        async function handleHotelDelete(hotelId) {
            if (confirm("🚨 确定连带所有图片、点评彻底拆除该物理地标？不可逆！")) {
                await supabaseClient.from('hotels').delete().eq('id', hotelId);
                map.closePopup(); await loadSavedMarkers();
            }
        }

        // ==========================================
        // 6. 新增目的地表单 (集成封面图上传)
        // ==========================================
        const addBtn = document.getElementById('add-btn');
        const mapInstruction = document.getElementById('map-instruction');
        addBtn.addEventListener('click', () => {
            isAddingMode = !isAddingMode;
            if (isAddingMode) {
                addBtn.innerHTML = '取消放置'; addBtn.classList.add('active'); mapInstruction.style.display = 'block';
                document.getElementById('map-container').classList.add('crosshair-cursor-active');
            } else { resetAddingMode(); }
        });

        function resetAddingMode() {
            isAddingMode = false; mapInstruction.style.display = 'none';
            addBtn.innerHTML = '<i class="fa-solid fa-location-dot"></i> 新增野奢目的地';
            addBtn.classList.remove('active'); document.getElementById('map-container').classList.remove('crosshair-cursor-active');
            if (activeMarker && !hotels.find(h => h.lat === activeMarker.getLatLng().lat)) { map.removeLayer(activeMarker); activeMarker = null; }
        }

        map.on('click', (e) => { if (isAddingMode) openBuilderFormAtLatLng(e.latlng.lat, e.latlng.lng); });

        function openBuilderFormAtLatLng(lat, lng) {
            if (activeMarker) activeMarker.setLatLng([lat, lng]);
            else activeMarker = L.marker([lat, lng], { icon: L.divIcon({ className: 'wild-luxury-pin', html: `<div class="ring-pin gold"></div>`, iconSize: [24, 24] }) }).addTo(map);

            const hotelTextId = 'hotel_' + Date.now();
            const formHTML = `
                <div class="custom-form">
                    <h3>创建野奢地标</h3>
                    <div class="form-group"><label>酒店名称 *</label><input type="text" id="new-hotel-name" placeholder="如：纳米比亚星空营地" required></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px;">
                    <div class="form-group">
                        <label>地区</label>
                        <select id="new-hotel-region">
                            <option value="东亚">东亚</option>
                            <option value="东南亚">东南亚</option>
                            <option value="中东及北非">中东及北非</option>
                            <option value="撒哈拉以南非洲">撒哈拉以南非洲</option>
                            <option value="欧洲">欧洲</option>
                            <option value="北美洲">北美洲</option>
                            <option value="南美洲">南美洲</option>
                            <option value="大洋洲及极地">大洋洲及极地</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>地貌</label>
                        <select id="new-hotel-landscape">
                            <option value="🌵 沙漠荒漠">🌵 沙漠荒漠</option>
                            <option value="⛰️ 悬崖山谷">⛰️ 悬崖山谷</option>
                            <option value="🌲 原始森林">🌲 原始森林</option>
                            <option value="🌊 旷野海岸">🌊 旷野海岸</option>
                            <option value="❄️ 极地冰川">❄️ 极地冰川</option>
                            <option value="🌾 稀树草原">🌾 稀树草原</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>最佳造访时节</label>
                    <select id="new-hotel-season">
                        <option value="3-5月 🌸">3-5月 🌸</option>
                        <option value="6-8月 ☀️">6-8月 ☀️</option>
                        <option value="9-11月 🍁">9-11月 🍁</option>
                        <option value="12-2月 ❄️">12-2月 ❄️</option>
                    </select>
                </div>v>
                    
                    <!-- 核心组件：封面图选框 -->
                    <div class="form-group">
                        <label>目的地招牌封面图 *</label>
                        <input type="file" id="new-hotel-cover" accept="image/*" required style="font-size:11px; padding:2px;">
                    </div>

                    <div class="form-group"><label>首发入住体验 *</label><textarea id="new-hotel-desc" rows="2" placeholder="写下第一笔探险注解..."></textarea></div>
                    <button class="submit-btn" id="save-hotel-btn" onclick="saveNewHotel('${hotelTextId}', ${lat}, ${lng})">同步至云端</button>
                </div>`;
            activeMarker.bindPopup(formHTML).openPopup();
        }

        async function saveNewHotel(hotelId, lat, lng) {
            const name = document.getElementById('new-hotel-name').value.trim();
            const region = document.getElementById('new-hotel-region').value;
            const landscape = document.getElementById('new-hotel-landscape').value;
            const season = document.getElementById('new-hotel-season').value;
            const desc = document.getElementById('new-hotel-desc').value.trim();
            const coverInput = document.getElementById('new-hotel-cover');
            const saveBtn = document.getElementById('save-hotel-btn');

            if (!name || !desc || !coverInput.files[0]) { alert('请完整填写地标名称、首建点评并上传封面图！'); return; }
            saveBtn.disabled = true; saveBtn.innerText = "压缩影像并对接云端...";

            try {
                // 1. 强力压缩并同步上传主封面
                const compressedCover = await compressImage(coverInput.files[0], 1000, 0.7);
                const coverUrl = await uploadCompressedFile(compressedCover, 'covers');

                // 2. 插入酒店属性
                await supabaseClient.from('hotels').insert([{ id: hotelId, name, region, landscape, lat, lng, owner_id: MY_FINGERPRINT, cover_url: coverUrl }]);
                
                // 3. 插入首发评价
                await supabaseClient.from('reviews').insert([{ hotel_id: hotelId, rating: 5, comment: desc, wildness: 'A', privacy: 'A', luxury: 'A', best_season: season, owner_id: MY_FINGERPRINT }]);

                alert('🎉 野奢目的地成功开辟！'); resetAddingMode(); await loadSavedMarkers();
            } catch (err) { alert('同步故障: ' + err.message); }
        }

        function parseCoordinatePart(p) { p = p.trim().toUpperCase(); const m = p.match(/^(\d+)\.(\d+)\.(\d+)([NSEW])$/); if (m) { const dd = parseFloat(m[1]) + (parseFloat(m[2])/60) + (parseFloat(m[3])/3600); return (m[4]==='S'||m[4]==='W') ? -dd : dd; } return parseFloat(p); }
        window.locateByCoords = function() {
            const i = document.getElementById('manual-coords').value.trim(); if (!i) return;
            const parts = i.split(',');
            try { const lat = parseCoordinatePart(parts[0]), lng = parseCoordinatePart(parts[1]); map.setView([lat, lng], 10); openBuilderFormAtLatLng(lat, lng); } catch (e) { alert('格式转换失败'); }
        }

        function escapeHtml(s) { return s ? s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;") : ''; }
        loadSavedMarkers();
    </script>
</body>
</html>
