<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>野奢酒店探索地图</title>

    <!-- 1. 引入 Leaflet 地图的样式和引擎 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- 2. 引入 FontAwesome 图标库 (用于红心、评分星星等图标) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 3. 引入 Supabase 官方 JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* 基础样式：全屏撑满，隐藏滚动条 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #F5F2EB;
        }

        /* 地图容器：铺满整个屏幕，处于底层 */
        #map-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 顶部控制栏 */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none; /* 穿透点击，避免遮挡地图拖拽 */
        }

        /* 左上角高颜值品牌悬浮卡片 */
        .brand-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            pointer-events: auto;
        }

        .brand-card h1 {
            margin: 0;
            font-size: 18px;
            color: #2D4B34; /* 优雅的森林绿 */
            letter-spacing: 1px;
            font-family: 'Playfair Display', Georgia, serif;
        }

        /* 右上角“＋ 新增野奢目的地”按钮 */
        .add-btn {
            background: #2D4B34;
            color: #F5F2EB;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            pointer-events: auto;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-btn:hover {
            background: #1e3324;
            transform: scale(1.03);
        }

        /* 激活状态：处于放置/输入坐标模式 */
        .add-btn.active {
            background: #d9534f; /* 醒目的红色，提示取消 */
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        /* 顶部居中的坐标输入与指示浮窗 */
        .map-instruction {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: #d9534f;
            color: white;
            padding: 12px 20px;
            border-radius: 16px;
            font-size: 13px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none; /* 默认隐藏 */
            text-align: center;
        }

        /* 地图处于准备放置状态时的十字准星 */
        .crosshair-cursor-active {
            cursor: crosshair !important;
        }

        /* 气泡弹窗自定义表单样式 */
        .custom-form {
            width: 280px;
            padding: 5px;
            max-height: 380px;
            overflow-y: auto;
        }

        .custom-form h3 {
            margin: 0;
            color: #2D4B34;
            font-size: 16px;
            font-family: 'Playfair Display', Georgia, serif;
        }

        .form-group {
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            color: #666;
            margin-bottom: 4px;
            font-weight: bold;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 6px;
            font-size: 12px;
            background-color: #fff;
        }

        /* 星星评分系统 */
        .star-rating {
            display: flex;
            gap: 5px;
            font-size: 18px;
            color: #ccc;
            cursor: pointer;
        }

        .star-rating .fa-star.active {
            color: #f39c12;
        }

        /* 提交按钮 */
        .submit-btn {
            background: #2D4B34;
            color: white;
            border: none;
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            margin-top: 5px;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #1e3324;
        }
    </style>
</head>
<body>

    <!-- 顶部控制栏（穿透层） -->
    <div class="top-bar">
        <div class="brand-card">
            <h1>WILD LUXURY HORIZON</h1>
        </div>
        <button class="add-btn" id="add-btn">
            <i class="fa-solid fa-location-dot"></i> 新增野奢目的地
        </button>
    </div>

    <!-- 点击指示与高级经纬度坐标输入条 -->
    <div class="map-instruction" id="map-instruction">
        <span style="display: block; margin-bottom: 8px; font-weight: bold;">请在地图上点击 📍 或直接输入您的特色坐标：</span>
        <div style="display: flex; gap: 8px; justify-content: center; align-items: center; pointer-events: auto;">
            <input type="text" id="manual-coords" placeholder="(30.23.19N, 5.50.35W)" 
                   style="padding: 6px 12px; border: none; border-radius: 15px; font-size: 12px; width: 230px; color: #1a1a1a; outline: none;">
            <button onclick="locateByCoords()" 
                    style="background: #2D4B34; color: white; border: none; padding: 6px 14px; border-radius: 15px; font-size: 12px; cursor: pointer; font-weight: bold; transition: background 0.2s;">
                精准定位
            </button>
        </div>
    </div>

    <!-- 全屏地图容器 -->
    <div id="map-container"></div>

    <script>
        // ==========================================
        // 1. 初始化 Supabase 连接（使用专属配置与防冲突变量名）
        // ==========================================
        const SUPABASE_URL = "https://hfqyhqdwoojaifhgeegs.supabase.co";
        const SUPABASE_KEY = "sb_publishable_11x6y1H61cwFKe5vKcB8EA__IR-113I";
        
        // 核心修复：重命名为 supabaseClient 避免本地运行环境下与库名发生命名冲突
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==========================================
        // 2. 地图初始化（限制缩放和边界）
        // ==========================================
        const corner1 = L.latLng(-85, -180);
        const corner2 = L.latLng(85, 180);
        const worldBounds = L.latLngBounds(corner1, corner2);

        const map = L.map('map-container', {
            maxBounds: worldBounds,
            maxBoundsViscosity: 1.0,
            minZoom: 3,
            zoomControl: false
        }).setView([34.0, 108.0], 3); // 默认定位

        // 核心修复：更换为极高质感的 CartoDB 复古沙滩色底图，不限本地协议（file:///），保障本地极速加载
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            subdomains: 'abcd',
            maxZoom: 20,
            noWrap: true
        }).addTo(map);

        // ==========================================
        // 3. 状态管理与数据缓存
        // ==========================================
        let isAddingMode = false;
        let activeMarker = null;
        let hotels = []; // 云端拉取的数据

        // ==========================================
        // 4. 从云端 Supabase 数据库实时拉取标记数据
        // ==========================================
        async function loadSavedMarkers() {
            try {
                const { data, error } = await supabaseClient
                    .from('hotels')
                    .select('*');

                if (error) throw error;

                hotels = data || [];
                
                // 清理地图上旧的图层，重新绘制
                map.eachLayer((layer) => {
                    if (layer instanceof L.Marker && layer !== activeMarker) {
                        map.removeLayer(layer);
                    }
                });

                hotels.forEach(hotel => {
                    createHotelMarkerOnMap(hotel);
                });
            } catch (err) {
                console.error("从云端加载数据失败: ", err.message);
            }
        }

        function createHotelMarkerOnMap(hotel) {
            const marker = L.marker([hotel.lat, hotel.lng]).addTo(map);
            
            // 动态重新计算总评价得分
            const totalScore = hotel.reviews.reduce((sum, r) => sum + r.rating, 0);
            const avgScore = hotel.reviews.length > 0 ? (totalScore / hotel.reviews.length).toFixed(1) : "N/A";

            const getPopupHTML = () => {
                let reviewsHTML = '';
                hotel.reviews.forEach((r, idx) => {
                    let stars = '';
                    for (let i = 1; i <= 5; i++) {
                        stars += `<i class="fa-solid fa-star" style="color: ${i <= r.rating ? '#f39c12' : '#ccc'}; font-size: 10px;"></i>`;
                    }
                    reviewsHTML += `
                        <div style="border-bottom: 1px dashed #eee; padding: 6px 0;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-size: 11px; font-weight: bold; color: #555;">住客 #${idx+1}</span>
                                <div>${stars}</div>
                            </div>
                            <p style="margin: 3px 0; font-size: 11px; color: #666; word-wrap: break-word;">${r.comment}</p>
                            ${r.photo ? `<img src="${r.photo}" style="width: 100%; max-height: 90px; object-fit: cover; border-radius: 4px; margin-top: 4px;">` : ''}
                        </div>
                    `;
                });

                return `
                    <div class="custom-form">
                        <div style="display: flex; justify-content: space-between; align-items: start; gap: 8px;">
                            <h3 style="margin:0;">${hotel.name}</h3>
                            <button onclick="toggleWishlist('${hotel.id}')" style="background: none; border: none; cursor: pointer; color: ${hotel.is_wishlist ? '#d9534f' : '#ccc'}; font-size: 16px;">
                                <i class="${hotel.is_wishlist ? 'fa-solid' : 'fa-regular'} fa-heart"></i>
                            </button>
                        </div>
                        <p style="font-size: 11px; color: #888; margin: 4px 0 10px 0;">
                            📍 ${hotel.region} · ${hotel.landscape || '🌲 秘境'} · 综合评分：<strong style="color: #f39c12;">★ ${avgScore}</strong> (${hotel.reviews.length}条评价)
                        </p>
                        
                        <div style="background: #f9f9f9; padding: 8px; border-radius: 6px; margin-bottom: 10px; max-height: 140px; overflow-y: auto; border: 1px solid #f0f0f0;">
                            <label style="font-size: 11px; font-weight: bold; color: #444; display: block; margin-bottom: 4px;">过往入住感受：</label>
                            ${reviewsHTML}
                        </div>

                        <div style="border-top: 1px solid #eee; padding-top: 8px;">
                            <strong style="font-size: 11px; color: #2D4B34; display: block; margin-bottom: 6px;">续写我的入住体验：</strong>
                            <div class="form-group">
                                <label>评分：</label>
                                <div class="star-rating" id="star-review-${hotel.id}">
                                    <i class="fa-solid fa-star active" data-val="1" onclick="setPopRating(this, 1)"></i>
                                    <i class="fa-solid fa-star active" data-val="2" onclick="setPopRating(this, 2)"></i>
                                    <i class="fa-solid fa-star active" data-val="3" onclick="setPopRating(this, 3)"></i>
                                    <i class="fa-solid fa-star active" data-val="4" onclick="setPopRating(this, 4)"></i>
                                    <i class="fa-solid fa-star active" data-val="5" onclick="setPopRating(this, 5)"></i>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>体验评价：</label>
                                <textarea id="text-review-${hotel.id}" rows="2" placeholder="写写你的体验评价..."></textarea>
                            </div>
                            <div class="form-group">
                                <label>添加照片：</label>
                                <input type="file" id="file-review-${hotel.id}" accept="image/*" style="font-size: 10px; padding: 2px;">
                            </div>
                            <button class="submit-btn" onclick="submitNewReview('${hotel.id}')">提交我的评价</button>
                        </div>
                    </div>
                `;
            };

            marker.bindPopup(getPopupHTML);
        }

        // ==========================================
        // 5. “新增目的地” 交互控制
        // ==========================================
        const addBtn = document.getElementById('add-btn');
        const mapInstruction = document.getElementById('map-instruction');
        const mapContainerEl = document.getElementById('map-container');

        addBtn.addEventListener('click', () => {
            isAddingMode = !isAddingMode;

            if (isAddingMode) {
                addBtn.innerHTML = '<i class="fa-solid fa-xmark"></i> 取消放置';
                addBtn.classList.add('active');
                mapInstruction.style.display = 'block';
                mapContainerEl.classList.add('crosshair-cursor-active');
            } else {
                resetAddingMode();
            }
        });

        function resetAddingMode() {
            isAddingMode = false;
            addBtn.innerHTML = '<i class="fa-solid fa-location-dot"></i> 新增野奢目的地';
            addBtn.classList.remove('active');
            mapInstruction.style.display = 'none';
            mapContainerEl.classList.remove('crosshair-cursor-active');
            document.getElementById('manual-coords').value = '';
            if (activeMarker) {
                map.removeLayer(activeMarker);
                activeMarker = null;
            }
        }

        map.on('click', (e) => {
            if (!isAddingMode) return;
            const { lat, lng } = e.latlng;
            openBuilderFormAtLatLng(lat, lng);
        });

        function openBuilderFormAtLatLng(lat, lng) {
            const targetLatLng = L.latLng(lat, lng);

            if (activeMarker) {
                activeMarker.setLatLng(targetLatLng);
            } else {
                activeMarker = L.marker(targetLatLng).addTo(map);
            }

            const firstBuilderForm = `
                <div class="custom-form">
                    <h3>创建新的野奢目的地</h3>
                    <div style="font-size: 10px; color: #888; margin-bottom: 8px;">
                        坐标: [ ${lat.toFixed(4)}, ${lng.toFixed(4)} ]
                    </div>
                    <div class="form-group">
                        <label>酒店名称 *</label>
                        <input type="text" id="new-hotel-name" placeholder="如：极地之光营地" required>
                    </div>
                    <div class="form-group">
                        <label>所在地区 *</label>
                        <select id="new-hotel-region">
                            <option value="东亚">东亚</option>
                            <option value="东南亚">东南亚</option>
                            <option value="北美洲">北美洲</option>
                            <option value="欧洲">欧洲</option>
                            <option value="非洲">非洲</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>地貌特征 *</label>
                        <select id="new-hotel-landscape">
                            <option value="🌵 沙漠">🌵 沙漠</option>
                            <option value="⛰️ 悬崖山谷">⛰️ 悬崖山谷</option>
                            <option value="🌴 热带雨林">🌴 热带雨林</option>
                            <option value="❄️ 极地冰川">❄️ 极地冰川</option>
                            <option value="🌊 戈壁荒漠">🌊 戈壁荒漠</option>
                            <option value="🏖️ 海岛秘境">🏖️ 海岛秘境</option>
                            <option value="🪵 原始森林">🪵 原始森林</option>
                            <option value="🌾 高原草原">🌾 高原草原</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>我的评分</label>
                        <div class="star-rating" id="new-hotel-stars">
                            <i class="fa-solid fa-star active" data-val="1" onclick="setNewRating(1)"></i>
                            <i class="fa-solid fa-star active" data-val="2" onclick="setNewRating(2)"></i>
                            <i class="fa-solid fa-star active" data-val="3" onclick="setNewRating(3)"></i>
                            <i class="fa-solid fa-star active" data-val="4" onclick="setNewRating(4)"></i>
                            <i class="fa-solid fa-star active" data-val="5" onclick="setNewRating(5)"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>首建体验评测 *</label>
                        <textarea id="new-hotel-desc" rows="3" placeholder="写下你的第一手入住真实体验..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>上传头图照片</label>
                        <input type="file" id="new-hotel-photo" accept="image/*">
                    </div>
                    <button class="submit-btn" id="save-hotel-btn" onclick="saveNewHotel(${lat}, ${lng})">保存目的地</button>
                </div>
            `;

            activeMarker.bindPopup(firstBuilderForm).openPopup();
        }

        // ==========================================
        // 6. 评分星级点击交互
        // ==========================================
        let currentNewRating = 5; 
        function setNewRating(val) {
            currentNewRating = val;
            const stars = document.querySelectorAll('#new-hotel-stars .fa-star');
            stars.forEach((star, index) => {
                if (index < val) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }

        let currentPopRating = 5;
        function setPopRating(el, val) {
            currentPopRating = val;
            const starContainer = el.parentElement;
            const stars = starContainer.querySelectorAll('.fa-star');
            stars.forEach((star, index) => {
                if (index < val) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }

        // 压缩图片防止体积太大撑爆数据库
        function compressImage(file, maxWidth = 600) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale = maxWidth / img.width;
                        if(img.width > maxWidth) {
                            canvas.width = maxWidth;
                            canvas.height = img.height * scale;
                        } else {
                            canvas.width = img.width;
                            canvas.height = img.height;
                        }
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); // 0.7 压缩质量
                    };
                };
            });
        }

        // ==========================================
        // 7. 核心保存逻辑：写入云端 Supabase 数据库
        // ==========================================
        async function saveNewHotel(lat, lng) {
            const name = document.getElementById('new-hotel-name').value.trim();
            const region = document.getElementById('new-hotel-region').value;
            const landscape = document.getElementById('new-hotel-landscape').value;
            const desc = document.getElementById('new-hotel-desc').value.trim();
            const fileInput = document.getElementById('new-hotel-photo');
            const saveBtn = document.getElementById('save-hotel-btn');

            if (!name || !desc) {
                alert('请填写完整的酒店名称和您的首建评测体验！');
                return;
            }

            saveBtn.disabled = true;
            saveBtn.innerText = "正在云端同步中...";

            try {
                let photoBase64 = null;
                if (fileInput.files && fileInput.files[0]) {
                    photoBase64 = await compressImage(fileInput.files[0]);
                }

                const newHotel = {
                    id: 'hotel_' + Date.now(),
                    name: name,
                    region: region,
                    landscape: landscape,
                    lat: lat,
                    lng: lng,
                    is_wishlist: false,
                    reviews: [
                        {
                            rating: currentNewRating,
                            comment: desc,
                            photo: photoBase64
                        }
                    ]
                };

                // 向 Supabase 数据库插入一行新数据
                const { error } = await supabaseClient
                    .from('hotels')
                    .insert([newHotel]);

                if (error) throw error;

                alert('🎉 成功创建！新目的地已同步至云端。');
                resetAddingMode();
                await loadSavedMarkers(); // 重新拉取最新数据
            } catch (err) {
                alert('云端保存失败: ' + err.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "保存目的地";
            }
        }

        // ==========================================
        // 8. 后来者云端追评盖楼
        // ==========================================
        window.submitNewReview = async function(hotelId) {
            const hotel = hotels.find(h => h.id === hotelId);
            if (!hotel) return;

            const comment = document.getElementById(`text-review-${hotelId}`).value.trim();
            const fileInput = document.getElementById(`file-review-${hotelId}`);

            if (!comment) {
                alert('追评内容不能为空！');
                return;
            }

            try {
                let photoBase64 = null;
                if (fileInput.files && fileInput.files[0]) {
                    photoBase64 = await compressImage(fileInput.files[0]);
                }

                const newReview = {
                    rating: currentPopRating,
                    comment: comment,
                    photo: photoBase64
                };

                // 将追评追加进原数组
                const updatedReviews = [...hotel.reviews, newReview];

                const { error } = await supabaseClient
                    .from('hotels')
                    .update({ reviews: updatedReviews })
                    .eq('id', hotelId);

                if (error) throw error;

                alert('🔥 追评成功！所有人都可以看到你的体验了。');
                map.closePopup();
                await loadSavedMarkers();
            } catch (err) {
                alert('追评失败: ' + err.message);
            }
        }

        // ==========================================
        // 9. 一键收藏心愿单
        // ==========================================
        window.toggleWishlist = async function(hotelId) {
            const hotel = hotels.find(h => h.id === hotelId);
            if (!hotel) return;

            const nextWishlistState = !hotel.is_wishlist;

            try {
                const { error } = await supabaseClient
                    .from('hotels')
                    .update({ is_wishlist: nextWishlistState })
                    .eq('id', hotelId);

                if (error) throw error;

                alert(nextWishlistState ? '成功添加到您的心愿单！❤️' : '已从心愿单移除');
                map.closePopup();
                await loadSavedMarkers();
            } catch (err) {
                alert('心愿单操作失败: ' + err.message);
            }
        }

        // ==========================================
        // 10. DMS (度分秒) 坐标智能定位
        // ==========================================
        function parseCoordinatePart(part, isLatitude) {
            part = part.trim().toUpperCase();
            const dmsRegex = /^(\d+)\.(\d+)\.(\d+)([NSEW])$/;
            const match = part.match(dmsRegex);
            
            if (match) {
                const d = parseFloat(match[1]);
                const m = parseFloat(match[2]);
                const s = parseFloat(match[3]);
                const dir = match[4];
                
                if (isLatitude && (dir !== 'N' && dir !== 'S')) throw new Error("纬度方向符号错误！");
                if (!isLatitude && (dir !== 'E' && dir !== 'W')) throw new Error("经度方向符号错误！");
                
                let dd = d + (m / 60) + (s / 3600);
                if (dir === 'S' || dir === 'W') dd = -dd;
                return dd;
            }
            
            const ddVal = parseFloat(part);
            if (isNaN(ddVal)) throw new Error("格式无法自动识别。");
            return ddVal;
        }

        window.locateByCoords = function() {
            let coordInput = document.getElementById('manual-coords').value.trim();
            if (!coordInput) {
                alert('请输入坐标后再进行精准定位！');
                return;
            }

            coordInput = coordInput.replace(/^[\(\uff08]/, '').replace(/[\)\uff09]$/, '');

            const parts = coordInput.replace('，', ',').split(',');
            if (parts.length !== 2) {
                alert('格式不正确！请输入如：30.23.19N, 5.50.35W');
                return;
            }

            try {
                const lat = parseCoordinatePart(parts[0], true);
                const lng = parseCoordinatePart(parts[1], false);

                if (lat < -90 || lat > 90 || lng < -180 || lng > 180) {
                    alert('经纬度超出地球范围！');
                    return;
                }

                map.flyTo([lat, lng], 10, { animate: true, duration: 1.5 });

                setTimeout(() => {
                    openBuilderFormAtLatLng(lat, lng);
                }, 1600);

            } catch (err) {
                alert('解析错误：' + err.message);
            }
        };

        // ==========================================
        // 11. 初始化加载
        // ==========================================
        loadSavedMarkers();

    </script>
